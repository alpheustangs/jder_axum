[package]
name = "jder_axum"
version = "0.5.0"
authors = ["Alpheus Tang"]
edition = "2021"
rust-version = "1.85.0"
description = """
A response builder for axum
"""
readme = "README.md"
homepage = "https://github.com/alpheustangs/jder_axum"
repository = "https://github.com/alpheustangs/jder_axum"
license = "MIT"
keywords = [
    "jder",
    "axum",
    "json",
    "response",
    "util",
]
categories = [
    "parser-implementations",
    "web-programming",
]
include = [
    "src/*", 
    "Cargo.toml",
    "README.md",
]

[package.metadata.docs.rs]
features = ["all"]

[lib]
name = "jder_axum"
path = "src/lib.rs"

[dependencies]
axum ={ workspace = true }
axum-core = "~0.5.0"
axum-extra ={ version = "~0.10.0", optional = true }
axum_typed_multipart = { workspace = true, optional = true }
bytes = "^1"
serde = { workspace = true }
serde_json = "^1"
utoipa = { version = "^5.0.0", optional = true }

[features]
default = []
multipart = ["dep:axum_typed_multipart"]
extra = ["dep:axum-extra"]
utoipa = ["dep:utoipa"]
all = ["multipart", "extra", "utoipa"]
